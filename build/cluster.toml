# Cluster bootstrap and deploy tasks

[cluster]
description = "Build and deploy local k3s cluster with Navigator"
depends = [
  "docker:build:cluster",
  "docker:build:server",
  "docker:build:sandbox",
  "docker:build:pki-job",
]
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME=${CLUSTER_NAME:-navigator}
IMAGE_TAG=${IMAGE_TAG:-dev}
REGISTRY=${NAVIGATOR_REGISTRY:-d1i0nduu2f6qxk.cloudfront.net/navigator}

# Tag locally-built component images with distribution registry paths.
# These tags match what the HelmChart manifest expects, so when the
# bootstrap code imports them into k3s containerd the pods can resolve
# images locally without pulling from the network.
for component in server sandbox pki-job; do
  docker tag "navigator-${component}:${IMAGE_TAG}" "${REGISTRY}/${component}:${IMAGE_TAG}"
done

# Tell the bootstrap code which images to push into k3s containerd.
export NAVIGATOR_PUSH_IMAGES="${REGISTRY}/server:${IMAGE_TAG},${REGISTRY}/sandbox:${IMAGE_TAG},${REGISTRY}/pki-job:${IMAGE_TAG}"

# Deploy the cluster using the locally built image
nav cluster admin deploy --name "${CLUSTER_NAME}" --update-kube-config

echo ""
echo "Cluster '${CLUSTER_NAME}' is ready."
echo "KUBECONFIG has been updated."
"""

["cluster:deploy"]
description = "Build and deploy changes to existing cluster using local images"
depends = [
  "docker:build:server",
  "docker:build:sandbox",
  "docker:build:pki-job",
]
run = """
#!/usr/bin/env bash
set -euo pipefail

CLUSTER_NAME=${CLUSTER_NAME:-navigator}
CONTAINER_NAME="navigator-cluster-${CLUSTER_NAME}"
REGISTRY=${NAVIGATOR_REGISTRY:-d1i0nduu2f6qxk.cloudfront.net/navigator}
IMAGE_TAG=${IMAGE_TAG:-dev}

# Check if cluster container is running
if ! docker ps -q --filter "name=${CONTAINER_NAME}" | grep -q .; then
  echo "Error: Cluster container '${CONTAINER_NAME}' is not running."
  echo "Start the cluster first with: mise run cluster"
  exit 1
fi

# Tag locally-built images with distribution registry paths
for component in server sandbox pki-job; do
  docker tag "navigator-${component}:${IMAGE_TAG}" "${REGISTRY}/${component}:${IMAGE_TAG}"
done

# Import images into k3s containerd
echo "Importing local component images into cluster..."
docker save \
  "${REGISTRY}/server:${IMAGE_TAG}" \
  "${REGISTRY}/sandbox:${IMAGE_TAG}" \
  "${REGISTRY}/pki-job:${IMAGE_TAG}" \
  | docker exec -i "${CONTAINER_NAME}" ctr -a /run/k3s/containerd/containerd.sock images import -

echo "Upgrading helm release to use local images..."
helm upgrade navigator deploy/helm/navigator \
  --namespace navigator \
  --set image.repository=${REGISTRY}/server \
  --set image.tag=${IMAGE_TAG} \
  --set image.pullPolicy=IfNotPresent \
  --set server.sandboxImage=${REGISTRY}/sandbox:${IMAGE_TAG} \
  --set gateway.tls.jobImage=${REGISTRY}/pki-job:${IMAGE_TAG} \
  --wait

echo "Restarting deployment to pick up new images..."
kubectl rollout restart deployment/navigator -n navigator
kubectl rollout status deployment/navigator -n navigator

echo "Deploy complete!"
"""
