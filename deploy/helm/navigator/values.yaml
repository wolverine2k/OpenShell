# Default values for navigator

replicaCount: 1

image:
  repository: d1i0nduu2f6qxk.cloudfront.net/navigator/server
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8080
  nodePort: 30051

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Server configuration
server:
  logLevel: info
  sandboxNamespace: navigator
  dbUrl: "sqlite:/var/navigator/navigator.db"
  sandboxImage: "d1i0nduu2f6qxk.cloudfront.net/navigator/sandbox:latest"
  # gRPC endpoint for sandboxes to callback to Navigator (must be reachable from pods)
  grpcEndpoint: "http://navigator.navigator.svc.cluster.local:8080"
  # Public host/port returned to CLI clients for SSH proxy CONNECT requests.
  # For local clusters the default 127.0.0.1:8080 is correct; for remote
  # clusters these should be set to the externally reachable host and port.
  sshGatewayHost: ""
  sshGatewayPort: 0

gateway:
  enabled: true
  name: navigator-gateway
  className: envoy-gateway
  createGatewayClass: true
  listenerPort: 8080
  tls:
    enabled: false
    secretName: navigator-gateway-tls
    clientCaSecretName: navigator-gateway-client-ca
    cliSecretName: navigator-cli-client
    listenerPort: 443
    jobImage: d1i0nduu2f6qxk.cloudfront.net/navigator/pki-job:latest
    # Additional Subject Alternative Names for the gateway TLS certificate.
    # Entries that look like IP addresses are added as IP SANs; others as DNS SANs.
    extraSANs: []
