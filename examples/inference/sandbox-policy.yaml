version: 1

filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /etc
  - /app
  - /var/log
  - /proc/self
  - /dev/urandom
  read_write:
  - /sandbox
  - /tmp
  - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# No network policies means all outbound connections are denied and only
# inference.local is allowed.
